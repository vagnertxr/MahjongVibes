<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mahjong Vibes</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app" aria-label="Mahjong Vibes game board">
      <section class="table">
        <div class="topbar">
          <div>
            <h1>Mahjong Vibes</h1>
            <p id="roundLabel">East 1</p>
          </div>
          <div class="meters">
            <span id="wallCount">Wall 0</span>
            <span id="doraIndicator">Dora --</span>
            <button id="newGameBtn" type="button" title="Start a new hand">New Hand</button>
          </div>
        </div>

        <div class="players-grid">
          <article class="seat seat-top" id="seat-2"></article>
          <article class="seat seat-left" id="seat-3"></article>
          <section class="center-panel" aria-live="polite">
            <div class="river-title">Last discard</div>
            <div id="lastDiscard" class="last-discard">--</div>
            <div id="statusText" class="status">Loading table...</div>
            <div id="actionBar" class="action-bar"></div>
          </section>
          <article class="seat seat-right" id="seat-1"></article>
          <article class="seat seat-bottom human" id="seat-0"></article>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
